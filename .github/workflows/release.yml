name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4   # v6 ist ok, aber v4 ist stabiler

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20        # 24 ist oft noch zu neu für manche Pakete
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Check for styles.css
        id: styles
        run: |
          if [ -f styles.css ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          
          files="main.js manifest.json"
          if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
            files="$files styles.css"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --generate-notes \
            $files
